<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Nexia - Gestão de Água</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --pago: #27ae60;
            --nao-pago: #e74c3c;
            --pendente: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; padding-bottom: 50px; }

        /* TELA DE LOGIN */
        #loginScreen {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        }
        .login-box {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center;
        }
        input[type="password"] {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none;
        }
        .btn-entrar {
            width: 100%; padding: 12px; background: var(--primary);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* TELA PRINCIPAL */
        #mainScreen { display: none; padding: 20px; }
        .header { 
            background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logout-btn { background: #666; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* ESTILO PLANILHA */
        .condo-section { background: white; border-radius: 10px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .condo-title { 
            font-size: 1.5rem; color: var(--primary); border-left: 5px solid var(--primary); 
            padding: 5px 15px; margin-bottom: 10px; display: inline-block;
            cursor: text; background: #f9f9f9; border-radius: 0 5px 5px 0; outline: none;
        }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 2000px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; font-size: 12px; }
        th { background: #edf2f7; color: #4a5568; white-space: nowrap; }

        .col-dados { background: #f8fafc; text-align: left; min-width: 110px; }
        input.field-edit { width: 100%; border: none; background: transparent; font-size: 11px; outline: none; }

        /* BOTÕES DE STATUS */
        .btn-status {
            width: 80px; padding: 6px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 9px; text-transform: uppercase; color: white;
        }
        .nao-pago { background-color: var(--nao-pago); }
        .pago { background-color: var(--pago); }
        .pendente { background-color: var(--pendente); color: #333; }

        .notes-area {
            margin-top: 15px; width: 100%; min-height: 60px; padding: 10px;
            border: 1px solid #e2e8f0; border-radius: 5px; background: #fffdf0;
            font-size: 13px; resize: vertical; outline: none;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Gestão Nexia</h2>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Senha: 1234" required>
                <button type="submit" class="btn-entrar">ENTRAR NO SISTEMA</button>
            </form>
        </div>
    </div>

    <div id="mainScreen">
        <div class="header">
            <h1>Controle de Água </h1>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
        <div id="content"></div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = 'https://dwznzdnvtezhkqzqwrsa.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZajKS3fZjhbLeGLdo-2IsA_sQgarlui';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const meses = ['Out/25', 'Nov/25', 'Dez/25', 'Jan/26', 'Fev/26', 'Mar/26', 'Abr/26', 'Mai/26', 'Jun/26', 'Jul/26', 'Ago/26', 'Set/26', 'Out/26', 'Nov/26', 'Dez/26'];

        const condominios = [
            { id: "morrez", nome: "Condomínio Morrez", espaços: 8 },
            { id: "kito", nome: "Condomínio Kito", espaços: 8 },
            { id: "clinton", nome: "Condomínio Clinton", espaços: 8 },
            { id: "mussone", nome: "Condomínio Mussone", espaços: 8 },
            { id: "pembele", nome: "Condomínio Pembele", espaços: 8 },
            { id: "tchalla", nome: "Condomínio Tchalla", espaços: 8 },
            { id: "amelia", nome: "Condomínio Amélia", espaços: 8 },
            { id: "silvia", nome: "Condomínio Silvia", espaços: 8 },
            { id: "khongolote", nome: "Condomínio Khongolote", espaços: 8 },
            { id: "casagrande", nome: "Casa Grande", espaços: 1 }
        ];

        let statusData = {};

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('password').value === '1234') {
                abrirPainel();
            } else {
                alert('Senha incorreta!');
            }
        });

        function abrirPainel() {
            localStorage.setItem('auth_nexia_final', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            carregarDados();
        }

        function logout() {
            localStorage.removeItem('auth_nexia_final');
            location.reload();
        }

        async function carregarDados() {
            try {
                const { data } = await _supabase.from('pagamentos').select('*');
                if (data) {
                    data.forEach(item => statusData[item.id] = item.status);
                }
            } catch (e) { console.log("Erro ao carregar"); }
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            condominios.forEach(condo => {
                let html = `
                    <div class="condo-section">
                        <div class="condo-title" contenteditable="true" spellcheck="false">${condo.nome}</div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th colspan="4">Identificação do Cliente</th>
                                        <th colspan="4">Dados Financeiros</th>
                                        <th colspan="${meses.length}">Histórico de Pagamentos</th>
                                    </tr>
                                    <tr>
                                        <th>Nome</th><th>Contacto</th><th>Casa</th><th>Preço Água</th>
                                        <th>Dívida</th><th>Valor Total</th><th>Observação</th><th>Pagamento</th>
                                        ${meses.map(m => `<th>${m}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                `;

                for (let i = 1; i <= condo.espaços; i++) {
                    html += `
                        <tr>
                            <td class="col-dados"><input class="field-edit" placeholder="Nome..."></td>
                            <td class="col-dados"><input class="field-edit" placeholder="Tel..."></td>
                            <td class="col-dados"><strong>Espaço ${i}</strong></td>
                            <td class="col-dados"><input class="field-edit" placeholder="MT"></td>
                            <td class="col-dados"><input class="field-edit" placeholder="MT"></td>
                            <td class="col-dados"><input class="field-edit" placeholder="MT"></td>
                            <td class="col-dados"><input class="field-edit" placeholder="..."></td>
                            <td class="col-dados"><input class="field-edit" placeholder="Tipo..."></td>
                            ${meses.map(m => {
                                const id = `${condo.id}-${i}-${m}`;
                                const st = statusData[id] || 'nao-pago';
                                return `<td><button class="btn-status ${st}" onclick="mudarStatus('${id}', this)">${st.toUpperCase()}</button></td>`;
                            }).join('')}
                        </tr>
                    `;
                }

                html += `</tbody></table></div>
                        <textarea class="notes-area" placeholder="Notas sobre ${condo.nome}..."></textarea>
                    </div>`;
                container.innerHTML += html;
            });
        }

        async function mudarStatus(id, btn) {
            const current = btn.classList.contains('nao-pago') ? 'nao-pago' : btn.classList.contains('pendente') ? 'pendente' : 'pago';
            const next = current === 'nao-pago' ? 'pendente' : current === 'pendente' ? 'pago' : 'nao-pago';
            
            btn.className = `btn-status ${next}`;
            btn.innerText = next.toUpperCase();
            statusData[id] = next;

            await _supabase.from('pagamentos').upsert({ id: id, status: next, mes: id.split('-').pop() });
        }

        window.onload = () => {
            if (localStorage.getItem('auth_nexia_final') === 'true') {
                abrirPainel();
            }
        };
    </script>
</body>
</html>
