<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Água </title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --pago: #10b981;
            --nao-pago: #ef4444;
            --pendente: #f59e0b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }

        /* TELA DE LOGIN ANTIGA REESTILIZADA */
        #loginScreen {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .login-box {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 90%; max-width: 380px; text-align: center;
        }
        .login-box h2 { margin-bottom: 10px; font-weight: 700; color: #0f172a; }
        .login-box p { color: #64748b; margin-bottom: 25px; font-size: 14px; }
        input[type="password"] {
            width: 100%; padding: 14px; margin-bottom: 20px;
            border: 2px solid var(--border); border-radius: 10px; font-size: 16px; transition: 0.3s;
        }
        input[type="password"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-entrar {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.2s;
        }
        .btn-entrar:hover { background: #1d4ed8; transform: translateY(-1px); }

        /* DASHBOARD MODERNO */
        #mainScreen { display: none; padding: 30px; max-width: 1600px; margin: 0 auto; }
        .header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
        }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .status-badge { font-size: 12px; background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; margin-left: 10px; }

        .condo-card { 
            background: var(--card); border-radius: 16px; padding: 24px; margin-bottom: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }
        .condo-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 20px; display: inline-block; outline: none; }

        /* TABELA ESTILO PLANILHA MODERNA */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 2200px; }
        th { background: #f1f5f9; padding: 12px; text-align: center; font-size: 11px; text-transform: uppercase; color: #475569; font-weight: 600; border-bottom: 2px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid var(--border); border-right: 1px solid #f1f5f9; }

        .field-edit { 
            width: 100%; border: 1px solid transparent; background: transparent; 
            padding: 6px; font-size: 12px; border-radius: 6px; transition: 0.2s;
        }
        .field-edit:focus { background: #fff; border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* BOTÕES DE STATUS */
        .btn-status {
            width: 85px; padding: 7px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: 700; font-size: 9px; text-transform: uppercase; transition: 0.2s;
        }
        .btn-status:active { transform: scale(0.95); }
        .nao-pago { background: #fee2e2; color: #991b1b; }
        .pago { background: #dcfce7; color: #166534; }
        .pendente { background: #fef3c7; color: #92400e; }

        /* ÁREA DE NOTAS */
        .notes-section { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 15px; }
        .notes-label { font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; display: block; }
        .notes-area {
            width: 100%; min-height: 80px; padding: 12px; border: 1px solid var(--border);
            border-radius: 10px; background: #fffbeb; font-size: 13px; resize: vertical; outline: none; transition: 0.2s;
        }
        .notes-area:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Bem-vindo</h2>
            <p>Digite sua senha para acessar</p>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Senha" required autofocus>
                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="mainScreen">
        <div class="header">
            <h1>Gestão de Água <span id="syncLabel" class="status-badge">Sincronizando...</span></h1>
            <button class="btn-entrar" style="width:auto; padding: 10px 20px;" onclick="location.reload()">Atualizar Dados</button>
        </div>
        <div id="content"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dwznzdnvtezhkqzqwrsa.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZajKS3fZjhbLeGLdo-2IsA_sQgarlui';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const meses = ['Out/25', 'Nov/25', 'Dez/25', 'Jan/26', 'Fev/26', 'Mar/26', 'Abr/26', 'Mai/26', 'Jun/26', 'Jul/26', 'Ago/26', 'Set/26', 'Out/26', 'Nov/26', 'Dez/26'];
        const condominios = [
            { id: "mor", nome: "Condomínio Morrez", espaços: 8 },
            { id: "kit", nome: "Condomínio Kito", espaços: 8 },
            { id: "cli", nome: "Condomínio Clinton", espaços: 8 },
            { id: "mus", nome: "Condomínio Mussone", espaços: 8 },
            { id: "pem", nome: "Condomínio Pembele", espaços: 8 },
            { id: "tch", nome: "Condomínio Tchalla", espaços: 8 },
            { id: "ame", nome: "Condomínio Amélia", espaços: 8 },
            { id: "sil", nome: "Condomínio Silvia", espaços: 8 },
            { id: "kho", nome: "Condomínio Khongolote", espaços: 8 },
            { id: "cgr", nome: "Casa Grande", espaços: 1 }
        ];

        let dbStatus = {};
        let dbClientes = {};

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (document.getElementById('password').value === '1234') {
                localStorage.setItem('auth_nexia_pro', 'true');
                iniciarSistema();
            } else { alert('Acesso Negado: Senha Incorreta'); }
        });

        async function iniciarSistema() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            
            const [{ data: stData }, { data: clData }] = await Promise.all([
                _supabase.from('pagamentos').select('*'),
                _supabase.from('dados_clientes').select('*')
            ]);

            if (stData) stData.forEach(i => dbStatus[i.id] = i.status);
            if (clData) clData.forEach(i => dbClientes[i.id] = i);

            render();
            document.getElementById('syncLabel').innerText = "Sistema Online";
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            condominios.forEach(condo => {
                const condoData = dbClientes[condo.id] || {};
                let html = `
                <div class="condo-card">
                    <div class="condo-title" contenteditable="true" onblur="salvarCliente('${condo.id}', 'nome', this.innerText)">${condo.nome}</div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th colspan="4" style="background:#f8fafc">Identificação</th>
                                    <th colspan="4" style="background:#f1f5f9">Financeiro</th>
                                    <th colspan="${meses.length}" style="background:#f8fafc">Controle Mensal (2025-2026)</th>
                                </tr>
                                <tr>
                                    <th>Nome do Morador</th><th>Contacto</th><th>Casa</th><th>Preço</th>
                                    <th>Dívida</th><th>Valor Total</th><th>Observação</th><th>Tipo</th>
                                    ${meses.map(m => `<th>${m}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>`;

                for (let i = 1; i <= condo.espaços; i++) {
                    const rowId = `${condo.id}-${i}`;
                    const d = dbClientes[rowId] || {};
                    html += `
                        <tr>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'nome', this.value)" value="${d.nome || ''}" placeholder="..."></td>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'contacto', this.value)" value="${d.contacto || ''}" placeholder="..."></td>
                            <td><span style="font-weight:700; color:#64748b">#${i}</span></td>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'preco_agua', this.value)" value="${d.preco_agua || ''}" placeholder="MT"></td>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'divida', this.value)" value="${d.divida || ''}" placeholder="MT"></td>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'valor_total', this.value)" value="${d.valor_total || ''}" placeholder="MT"></td>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'observacao', this.value)" value="${d.observacao || ''}" placeholder="..."></td>
                            <td><input class="field-edit" onchange="salvarCliente('${rowId}', 'pagamento_tipo', this.value)" value="${d.pagamento_tipo || ''}" placeholder="..."></td>
                            ${meses.map(m => {
                                const cid = `${rowId}-${m}`;
                                const s = dbStatus[cid] || 'nao-pago';
                                return `<td><button class="btn-status ${s}" onclick="mudarStatus('${cid}', this)">${s.toUpperCase()}</button></td>`;
                            }).join('')}
                        </tr>`;
                }

                html += `</tbody></table></div>
                    <div class="notes-section">
                        <label class="notes-label">Notas do Condomínio:</label>
                        <textarea class="notes-area" onchange="salvarCliente('${condo.id}', 'notas_condominio', this.value)" placeholder="Escreva avisos ou detalhes importantes aqui...">${condoData.notas_condominio || ''}</textarea>
                    </div>
                </div>`;
                container.innerHTML += html;
            });
        }

        async function salvarCliente(id, campo, valor) {
            document.getElementById('syncLabel').innerText = "Salvando...";
            document.getElementById('syncLabel').style.background = "#fff7ed";
            document.getElementById('syncLabel').style.color = "#9a3412";
            
            const obj = { id: id };
            obj[campo] = valor;
            await _supabase.from('dados_clientes').upsert(obj);
            
            document.getElementById('syncLabel').innerText = "Salvo com sucesso";
            document.getElementById('syncLabel').style.background = "#dcfce7";
            document.getElementById('syncLabel').style.color = "#166534";
        }

        async function mudarStatus(id, btn) {
            const cur = btn.classList.contains('nao-pago') ? 'nao-pago' : btn.classList.contains('pendente') ? 'pendente' : 'pago';
            const nxt = cur === 'nao-pago' ? 'pendente' : cur === 'pendente' ? 'pago' : 'nao-pago';
            
            btn.className = `btn-status ${nxt}`;
            btn.innerText = nxt.toUpperCase();
            
            await _supabase.from('pagamentos').upsert({ id: id, status: nxt });
        }

        window.onload = () => { if (localStorage.getItem('auth_nexia_pro') === 'true') iniciarSistema(); };
    </script>
</body>
</html>
