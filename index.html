            background-color: #f5f5f5;
            color: #333;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .login-error.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ===== TELA PRINCIPAL ===== */
        .main-container {
            min-height: 100vh;
            background-color: #f5f5f5;
            padding-bottom: 40px;
        }

        .header {

        .condominio-section {

            margin: 30px auto;

        }

        .condominio-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            padding: 15px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .condominio-title {

            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 22px;
            font-weight: 700;

        .spreadsheet-container {
            background: white;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .spreadsheet {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;

        .spreadsheet thead {

            top: 0;

        .spreadsheet th {

            font-weight: 600;

        }

        .col-fixed {

            left: 0;
            z-index: 5;

        }

        .col-fixed:nth-child(3) {

        }

            position: relative;
            padding: 8px;
            border-radius: 3px;
            transition: background-color 0.2s;
        }

        .editable-cell:hover {

            border-radius: 3px;
            font-size: 13px;
            font-family: inherit;

            color: #667eea;

        }

            }

                padding: 4px 6px;
                font-size: 10px;
            }

                width: 150px;
                font-size: 16px;
            }
        }
    </style>
</head>

        // Função para salvar dados no Supabase
        async function saveToSupabase(table, data) {
            try {
                const { data: result, error } = await supabase
                    .from(table)
                    .upsert(data, { onConflict: 'id' });
                
                if (error) {
                    console.error('Erro ao salvar no Supabase:', error);
                    return false;
                }
                return true;
            } catch (err) {
                console.error('Erro na conexão com Supabase:', err);
                return false;
            }
        }

        // Função para carregar dados do Supabase
        async function loadFromSupabase(table) {
            try {
                const { data, error } = await supabase
                    .from(table)
                    .select('*');
                
                if (error) {
                    console.error('Erro ao carregar do Supabase:', error);
                    return null;
                }
                return data;
            } catch (err) {
                console.error('Erro na conexão com Supabase:', err);
                return null;
            }

                        statusData[clienteKey][mes] = randomStatus;

                });
            });
            localStorage.setItem('statusData', JSON.stringify(statusData));
            localStorage.setItem('clientesData', JSON.stringify(clientesData));
        }

        // Carregar dados do localStorage
        function loadData() {
            const savedStatus = localStorage.getItem('statusData');
            const savedClientes = localStorage.getItem('clientesData');
            const savedNomes = localStorage.getItem('nomesCondominios');
            
            if (savedStatus) {
                statusData = JSON.parse(savedStatus);
            } else {
                initializeStatusData();
            }
            
            if (savedClientes) {
                clientesData = JSON.parse(savedClientes);
            } else {
                Object.keys(condominios).forEach(condominio => {
                    condominios[condominio].forEach((cliente, index) => {
                        const clienteKey = `${condominio}-${index}`;
                        clientesData[clienteKey] = JSON.parse(JSON.stringify(cliente));
                    });
                });
                localStorage.setItem('clientesData', JSON.stringify(clientesData));
            }

            if (savedNomes) {
                nomesCondominios = JSON.parse(savedNomes);
            } else {
                Object.keys(condominios).forEach(condominio => {
                    nomesCondominios[condominio] = condominio;
                });
                localStorage.setItem('nomesCondominios', JSON.stringify(nomesCondominios));
            }
        }

        // Alternar status
        function toggleStatus(clienteKey, mes) {
            const statusCiclo = {
                'pago': 'nao-pago',
                'nao-pago': 'pendente',
                'pendente': 'pago'
            };
            
            const currentStatus = statusData[clienteKey][mes];
            statusData[clienteKey][mes] = statusCiclo[currentStatus];
            
            localStorage.setItem('statusData', JSON.stringify(statusData));
            
            // Salvar no Supabase
            saveToSupabase('pagamentos', {
                id: `${clienteKey}-${mes}`,
                cliente_id: clienteKey,
                mes: mes,
                status: statusData[clienteKey][mes]
            });
            
            const btn = document.querySelector(`[data-cliente="${clienteKey}"][data-mes="${mes}"]`);
            if (btn) {
                btn.className = `status-btn ${statusData[clienteKey][mes]}`;
                btn.textContent = getStatusLabel(statusData[clienteKey][mes]);
            }
        }

        // Obter label do status
        function getStatusLabel(status) {
            const labels = {
                'pago': 'Pago',
                'nao-pago': 'Não Pago',
                'pendente': 'Pendente'
            };
            return labels[status];
        }

        // Criar célula editável
        function createEditableCell(clienteKey, field, value) {
            const cell = document.createElement('td');
            cell.className = 'col-fixed editable-cell';
            cell.innerHTML = `
                <span class="cell-value">${value}</span>
                <span class="edit-icon">✎</span>
            `;
            
            cell.addEventListener('click', function() {
                const currentValue = clientesData[clienteKey][field];
                const input = document.createElement('input');
                input.type = field === 'preco' ? 'number' : 'text';
                if (field === 'preco') {
                    input.step = '0.01';
                }
                input.value = currentValue;
                
                cell.innerHTML = '';
                cell.appendChild(input);
                input.focus();
                
                function saveEdit() {
                    const newValue = input.value.trim() || currentValue;
                    clientesData[clienteKey][field] = newValue;
                    localStorage.setItem('clientesData', JSON.stringify(clientesData));
                    
                    // Salvar no Supabase
                    saveToSupabase('clientes', {
                        id: clienteKey,
                        nome: clientesData[clienteKey].nome,
                        contacto: clientesData[clienteKey].contacto,
                        casa: clientesData[clienteKey].casa,
                        preco: clientesData[clienteKey].preco
                    });
                    
                    cell.innerHTML = `
                        <span class="cell-value">${newValue}</span>
                        <span class="edit-icon">✎</span>
                    `;
                }
                
                input.addEventListener('blur', saveEdit);
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        saveEdit();
                    }
                });
            });
            
            return cell;
        }

        // Editar nome da propriedade
        function editCondominioName(condominioKey, currentName) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'title-input';
            input.value = currentName;
            
            const titleElement = document.querySelector(`[data-condominio="${condominioKey}"]`);
            if (!titleElement) return;
            
            titleElement.innerHTML = '';
            titleElement.appendChild(input);
            input.focus();
            
            function saveName() {
                const newName = input.value.trim() || currentName;
                nomesCondominios[condominioKey] = newName;
                localStorage.setItem('nomesCondominios', JSON.stringify(nomesCondominios));
                
                // Salvar no Supabase
                saveToSupabase('condominios', {
                    id: condominioKey,
                    nome: newName
                });
                
                titleElement.innerHTML = `
                    <span>${newName}</span>
                    <span class="edit-title-icon">✎</span>
                `;
                
                titleElement.addEventListener('click', () => editCondominioName(condominioKey, newName));
            }
            
            input.addEventListener('blur', saveName);
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    saveName();
                }
            });
        }

        // Preencher planilha de um condomínio
        function fillCondominioSpreadsheet(condominio) {
            const section = document.createElement('div');
            section.className = 'condominio-section';
            
            const header = document.createElement('div');
            header.className = 'condominio-header';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'condominio-title';
            titleDiv.setAttribute('data-condominio', condominio);
            titleDiv.innerHTML = `
                <span>${nomesCondominios[condominio] || condominio}</span>
                <span class="edit-title-icon">✎</span>
            `;
            
            titleDiv.addEventListener('click', () => editCondominioName(condominio, nomesCondominios[condominio] || condominio));
            
            header.appendChild(titleDiv);
            section.appendChild(header);
            
            const container = document.createElement('div');
            container.className = 'spreadsheet-container';
            
            const table = document.createElement('table');
            table.className = 'spreadsheet';
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            
            const headers = ['Nome', 'Contacto', 'Casa', 'Preço Água', ...mesesLabels];
            headers.forEach(header => {
                const th = document.createElement('th');
                th.className = (header === 'Nome' || header === 'Contacto' || header === 'Casa' || header === 'Preço Água') ? 'col-fixed' : 'col-month';
                th.textContent = header;
                headerRow.appendChild(th);
            });
            
            thead.appendChild(headerRow);
            table.appendChild(thead);
            
            const tbody = document.createElement('tbody');
            
            condominios[condominio].forEach((cliente, index) => {
                const row = document.createElement('tr');
                const clienteKey = `${condominio}-${index}`;
                
                const nomeCell = createEditableCell(clienteKey, 'nome', clientesData[clienteKey]?.nome || cliente.nome);
                const contactoCell = createEditableCell(clienteKey, 'contacto', clientesData[clienteKey]?.contacto || cliente.contacto);
                const casaCell = createEditableCell(clienteKey, 'casa', clientesData[clienteKey]?.casa || cliente.casa);
                const precoCell = createEditableCell(clienteKey, 'preco', clientesData[clienteKey]?.preco || cliente.preco);
                
                row.appendChild(nomeCell);
                row.appendChild(contactoCell);
                row.appendChild(casaCell);
                row.appendChild(precoCell);
                
                meses.forEach(mes => {
                    const cell = document.createElement('td');
                    cell.className = 'col-month';
                    
                    const btn = document.createElement('button');
                    btn.className = `status-btn ${statusData[clienteKey][mes]}`;
                    btn.textContent = getStatusLabel(statusData[clienteKey][mes]);
                    btn.setAttribute('data-cliente', clienteKey);
                    btn.setAttribute('data-mes', mes);
                    btn.onclick = (e) => {
                        e.preventDefault();
                        toggleStatus(clienteKey, mes);
                    };
                    
                    cell.appendChild(btn);
                    row.appendChild(cell);
                });
                
                tbody.appendChild(row);
            });
            
            table.appendChild(tbody);
            container.appendChild(table);
            section.appendChild(container);
            
            return section;
        }

        // Preencher todas as planilhas
        function fillAllSpreadsheets() {
            const container = document.getElementById('condominiosContainer');
            container.innerHTML = '';
            
            const ordem = ['Kito', 'Clinton', 'Morrez', 'Mussone', 'Pembele', 'Tchalla', 'Amélia', 'Silvia', 'Khongolote', 'Casa Grande'];
            
            ordem.forEach(condominio => {
                if (condominios[condominio]) {
                    container.appendChild(fillCondominioSpreadsheet(condominio));
                }
            });
        }

        // Lógica de Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            
            if (password === '1234') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                loadData();
                fillAllSpreadsheets();
                localStorage.setItem('isLoggedIn', 'true');
            } else {
                errorMsg.textContent = 'Senha incorreta!';
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
                
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('password').value = '';
            localStorage.setItem('isLoggedIn', 'false');
        });

        // Verificar se já está logado
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (isLoggedIn) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                loadData();
                fillAllSpreadsheets();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainScreen').style.display = 'none';
            }
        });
    </script>
</body>
</html>
